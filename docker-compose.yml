x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: dbt/Dockerfile.airflow
  dns:
    - 8.8.8.8
    - 8.8.4.4
  profiles: ["transform"]
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://pipeline:pipeline123@postgres/disasters
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    MINIO_ENDPOINT: minio:9000
    MINIO_ROOT_USER: minioadmin
    MINIO_ROOT_PASSWORD: minioadmin123
    _PIP_ADDITIONAL_REQUIREMENTS: "minio requests"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./kafka:/opt/airflow/kafka
    - ./dbt:/opt/airflow/dbt
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:

  # ─────────────────────────────────────────
  # PROFIL : core  (toujours lancé en premier)
  # ─────────────────────────────────────────

  zookeeper:
    profiles: ["core"]
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    healthcheck:
      test: echo stat | nc localhost 2181 || exit 1
      interval: 10s
      timeout: 10s
      retries: 3

  kafka:
    profiles: ["core"]
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  minio:
    profiles: ["core"]
    image: minio/minio:latest
    ports:
      - "9001:9000"
      - "9002:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ─── postgres sans profil = toujours disponible ───────────────────────────
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline123
      POSTGRES_DB: disasters
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # PROFIL : ingest  (consumer Kafka → MinIO)
  # ─────────────────────────────────────────

  consumer:
    profiles: ["ingest"]
    build:
      context: .
      dockerfile: kafka/Dockerfile.consumer
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC_EARTHQUAKES: earthquakes-raw
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_BUCKET_BRONZE: bronze
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  kafka-ui:
    profiles: ["ingest"]
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────
  # PROFIL : transform  (Airflow + dbt)
  # ─────────────────────────────────────────

  airflow-init:
    <<: *airflow-common
    profiles: ["transform"]
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    profiles: ["transform"]
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    profiles: ["transform"]
    command: scheduler
    # SUPPRIME cette ligne ↓↓↓
    # environment:
    #   _PIP_ADDITIONAL_REQUIREMENTS: "dbt-postgres==1.7.0 minio requests"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────
  # PROFIL : viz  (dashboard Streamlit)
  # ─────────────────────────────────────────

  streamlit:
    profiles: ["viz"]
    build:
      context: .
      dockerfile: dashboard/Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline123
      POSTGRES_DB: disasters
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  minio-data:
  postgres-data:
  airflow-logs:
